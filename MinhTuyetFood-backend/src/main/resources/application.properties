spring.application.name=MinhTuyetFood

spring.datasource.url=jdbc:mysql://localhost:3306/minhtuyetfood
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# Giu nguyen ten duoc dinh nghia theo code
#hibernate nó se tu dong chuyen tu camelCase thành snake_case => chuyen lai dung theo code cau hinh
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
